<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guestbook | 박경림</title>
    <link rel="stylesheet" href="style.css">
    <!-- Supabase SDK 연동 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="overflow: auto; height: auto;">
    <main class="guestbook-container">
        <header class="guestbook-header">
            <a href="index.html" class="back-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                돌아가기
            </a>
            <h1 style="color: var(--accent-color);">방명록</h1>
        </header>

        <section class="guestbook-form">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" placeholder="이름을 입력하세요">
            </div>
            <div class="form-group">
                <label for="message">메시지</label>
                <textarea id="message" placeholder="메시지를 남겨주세요"></textarea>
            </div>
            <button class="submit-btn" id="submitBtn">메시지 남기기</button>
        </section>

        <section class="message-list" id="messageList">
            <div class="empty-message">메시지를 불러오는 중입니다...</div>
        </section>
    </main>

    <script>
        // Supabase 초기화 설정
        const SUPABASE_URL = 'https://cwycaovstmvbdxnblfgi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_gdJK0TmU_Q4eHhTQBdWVpA__NIBt-V4';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const nameInput = document.getElementById('name');
        const messageInput = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const messageList = document.getElementById('messageList');

        // Supabase에서 메시지 불러오기
        async function loadMessages() {
            try {
                const { data: messages, error } = await supabase
                    .from('guestbook_messages')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('Error fetching messages:', error);
                    messageList.innerHTML = '<div class="empty-message">메시지를 불러오는 중 에러가 발생했습니다.</div>';
                    return;
                }

                messageList.innerHTML = '';

                if (!messages || messages.length === 0) {
                    messageList.innerHTML = '<div class="empty-message">아직 남겨진 메시지가 없습니다. 첫 번째 메시지를 남겨보세요!</div>';
                    return;
                }

                messages.forEach(msg => {
                    const card = document.createElement('div');
                    card.className = 'message-card';
                    card.innerHTML = `
                        <div class="message-info">
                            <span class="message-name">${escapeHTML(msg.name)}</span>
                            <span class="message-date">${new Date(msg.created_at).toLocaleDateString()}</span>
                        </div>
                        <div class="message-content">${escapeHTML(msg.content)}</div>
                    `;
                    messageList.appendChild(card);
                });
            } catch (err) {
                console.error(err);
            }
        }

        // Supabase에 메시지 저장하기
        submitBtn.addEventListener('click', async () => {
            const name = nameInput.value.trim();
            const content = messageInput.value.trim();

            if (!name || !content) {
                alert('이름과 메시지를 모두 입력해주세요!');
                return;
            }

            // 등록 중 로딩 상태 표시
            submitBtn.disabled = true;
            submitBtn.textContent = '등록 중...';

            try {
                const { error } = await supabase
                    .from('guestbook_messages')
                    .insert([{ name: name, content: content }]);

                if (error) {
                    console.error('Error inserting message:', error);
                    alert('메시지 등록에 실패했습니다. 올바른 키나 테이블이 설정되어 있는지 확인하세요.');
                } else {
                    nameInput.value = '';
                    messageInput.value = '';
                    await loadMessages();
                }
            } catch (err) {
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '메시지 남기기';
            }
        });

        // XSS 방지를 위한 HTML 이스케이프 함수
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        // 초기 로딩
        window.onload = loadMessages;
    </script>
</body>
</html>
