<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알바 기록 | Park Kyung-rim</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .jobs-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 40px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.8s ease-out;
        }

        .jobs-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .jobs-header h1 {
            font-family: 'Nanum Pen Script', cursive;
            font-size: 5rem;
            font-weight: normal;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .jobs-header p {
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        /* Timeline Layout */
        .timeline {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }

        .timeline::after {
            content: '';
            position: absolute;
            width: 4px;
            background-color: rgba(178, 58, 31, 0.1);
            top: 0;
            bottom: 0;
            left: 20px;
            border-radius: 2px;
        }

        .timeline-item {
            padding: 10px 0 40px 60px;
            position: relative;
            background-color: inherit;
            width: 100%;
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            left: 10px;
            background-color: var(--white);
            border: 4px solid var(--accent-color);
            top: 30px;
            border-radius: 50%;
            z-index: 1;
        }

        .timeline-content {
            padding: 20px;
            background-color: #fdfaf6;
            position: relative;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .timeline-content:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(178, 58, 31, 0.1);
        }

        @media screen and (max-width: 768px) {
            .timeline::after {
                left: 15px;
            }
            .timeline-item {
                padding-left: 50px;
            }
            .timeline-item::after {
                left: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="jobs-container">
        <a href="index.html" class="back-btn" style="margin-bottom: 20px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            메인 화면으로
        </a>

        <div class="jobs-header">
            <h1>튀르키예 알바 기록</h1>
            <p>교환학생 생활 중 경험한 소중한 실무 이야기들</p>
        </div>

        <div class="timeline">
            <!-- Item 1 -->
            <div class="timeline-item">
                <div class="timeline-content">
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <img src="KakaoTalk_20260416_230535457.jpg" alt="스위소텔 알바 1" style="width: 100%; height: auto; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                        <img src="KakaoTalk_20260416_230535457_01.jpg" alt="스위소텔 알바 2" style="width: 100%; height: auto; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                        <img src="KakaoTalk_20260416_230535457_02.jpg" alt="스위소텔 알바 3" style="width: 100%; height: auto; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                    </div>
                </div>
            </div>

            <!-- Item 2 -->
            <div class="timeline-item">
                <div class="timeline-content">
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <img src="KakaoTalk_20260416_230535457_03.jpg" alt="츠라안 팰리스 알바 1" style="width: 100%; height: auto; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                        <img src="KakaoTalk_20260416_230535457_04.jpg" alt="츠라안 팰리스 알바 2" style="width: 100%; height: auto; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                        <img src="KakaoTalk_20260416_230535457_05.jpg" alt="츠라안 팰리스 알바 3" style="width: 100%; height: auto; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                    </div>
                </div>
            </div>

            <!-- Item 3 -->
            <div class="timeline-item">
                <div class="timeline-content">
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <img src="KakaoTalk_20260416_230535457_06.jpg" alt="그랜드 앙카라 알바 1" style="width: 100%; height: auto; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                        <img src="KakaoTalk_20260416_230535457_07.jpg" alt="그랜드 앙카라 알바 2" style="width: 100%; height: auto; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                        <img src="KakaoTalk_20260416_230535457_08.jpg" alt="그랜드 앙카라 알바 3" style="width: 100%; height: auto; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Fullscreen Image Lightbox Script & Elements -->
    <script>
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                const lightbox = document.getElementById('image-lightbox');
                if (lightbox && lightbox.style.display === 'flex') {
                    lightbox.style.display = 'none';
                }
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const lightbox = document.getElementById('image-lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            
            const galleryImages = document.querySelectorAll('.timeline-content img');
            galleryImages.forEach(img => {
                img.style.cursor = 'zoom-in';
                img.addEventListener('click', (e) => {
                    e.stopPropagation();
                    lightboxImg.src = img.src;
                    lightbox.style.display = 'flex';
                });
            });
        });
    </script>

    <div id="image-lightbox" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; cursor: zoom-out;" onclick="this.style.display='none'">
        <img id="lightbox-img" src="" style="max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 5px; box-shadow: 0 5px 25px rgba(0,0,0,0.5);">
    </div>
</body>
</html>
